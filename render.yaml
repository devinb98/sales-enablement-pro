# Render Blueprint — deploys the API, the React app, and Postgres from this repo.
#
# Create via Render dashboard -> New -> Blueprint, pointed at this repository.
# Secrets (GOOGLE_API_KEY, PRESENTON_API_KEY) are marked sync: false and must be
# set in the dashboard; they are never committed.

databases:
  - name: sales-enablement-db
    databaseName: sales_enablement
    plan: free
    # Render's free Postgres expires ~30 days after creation. Note the expiry
    # date and confirm it falls after the grading window.

services:
  # ---- Flask API -----------------------------------------------------------
  - type: web
    name: sales-enablement-api
    runtime: python
    plan: free
    rootDir: server
    buildCommand: pip install -r requirements.txt
    # Migrations run at start, not at build: the build step should not depend on
    # the database being reachable, and this keeps a fresh deploy self-healing.
    #
    # TWO workers, deliberately. Plan generation can block a worker for many
    # seconds (the Gemini client ignores timeouts, so a slow call runs long), and
    # Render's health check has a 5s timeout — with a single worker, a generation
    # in flight means /api/health goes unanswered and Render restarts the service
    # mid-request. A second worker answers health checks while the first is busy,
    # so the service stays up. Two workers fit the 512 MB free instance for this
    # dataset (~200 MB each); threads kept at 2 to hold memory down.
    #
    # 120s timeout so a slow generation isn't killed by Gunicorn's 30s default.
    startCommand: >-
      flask db upgrade &&
      gunicorn wsgi:app
      --workers 2
      --threads 2
      --timeout 120
      --bind 0.0.0.0:$PORT
      --access-logfile -
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        # chromadb and psycopg2 ship no wheels for 3.14; pinning avoids a source build.
        value: "3.12.4"
      - key: FLASK_APP
        value: wsgi.py
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sales-enablement-db
          property: connectionString
      - key: FRONTEND_ORIGIN
        # The static site's exact origin — credentialed CORS cannot use "*".
        # Set literally rather than via fromService: on this deploy the
        # cross-service reference did not resolve at build/deploy time, which
        # left CORS rejecting the real frontend. Update if the web URL changes.
        value: https://sales-enablement-web.onrender.com
      - key: CHROMA_DIR
        # Ephemeral by design. Free instances cannot mount a disk, so the index
        # is rebuilt from Postgres at every boot — see app/services/vectorstore.py.
        value: /tmp/chroma
      - key: RETRIEVAL_TOP_K
        value: "8"
      - key: RETRIEVAL_MIN_SCORE
        # Calibrated against gemini-embedding-001. Lowering this does not relax
        # the weak-context gate, it disables it. See server/.env.example.
        value: "0.60"
      - key: GOOGLE_API_KEY
        sync: false # set in the Render dashboard — required
      # Presenton deck export is a stretch feature and not yet wired up. Its key
      # is optional for now; add it in the dashboard and flip PRESENTON_LIVE to 1
      # when the feature ships. Leaving PRESENTON_LIVE at 0 keeps the MVP deploy
      # from depending on a secret nothing consumes yet.
      - key: PRESENTON_BASE_URL
        value: https://api.presenton.ai
      - key: PRESENTON_LIVE
        value: "0"

  # ---- React static site ---------------------------------------------------
  - type: web
    name: sales-enablement-web
    runtime: static
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        # The API service's real origin. Render appended "-axkw" because the
        # bare name was already taken (subdomains are globally unique), and the
        # fromService reference did not inject this into the static build — which
        # left the frontend calling its own origin's /api and getting 404s. Vite
        # bakes this in at build time, so changing it needs a full rebuild, not
        # just a restart.
        value: https://sales-enablement-api-axkw.onrender.com
    routes:
      # Single-page app: every unknown path must serve index.html or a hard
      # refresh on /deals/3 returns 404 instead of the app.
      - type: rewrite
        source: /*
        destination: /index.html
